<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111b21">
<title>WhatsApp Chat</title>
<style>
:root{
  --bg-deep:#111b21;--bg-panel:#202c33;--bg-input:#2a3942;
  --bg-sent:#005c4b;--bg-recv:#202c33;--bg-chat:#0b141a;
  --border:#2a3942;--t1:#e9edef;--t2:#8696a0;--tm:rgba(255,255,255,.4);
  --green:#00a884;--green2:#06cf9c;--blue:#53bdeb;--red:#f15c6d;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;overscroll-behavior:none}
body{height:100%;height:100dvh;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-deep);color:var(--t1);-webkit-text-size-adjust:100%}
.app{display:flex;width:100%;height:100dvh;padding-top:var(--safe-top);padding-left:var(--safe-left);padding-right:var(--safe-right);overflow:hidden;position:relative}


.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;padding-top:max(20px,var(--safe-top))}
.modal-box{background:var(--bg-panel);border-radius:16px;padding:36px 24px;width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:16px}
.modal-logo{width:72px;height:72px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center}
.modal-box h2{color:var(--t1);font-size:20px;font-weight:600}
.modal-box p{color:var(--t2);font-size:14px;text-align:center;line-height:1.5}
.modal-input{width:100%;background:var(--bg-input);border:none;border-radius:8px;padding:13px 16px;color:var(--t1);font-size:16px;outline:none;transition:box-shadow .2s}
.modal-input:focus{box-shadow:0 0 0 2px var(--green)}
.modal-input::placeholder{color:var(--t2)}
.modal-btn{width:100%;background:var(--green);border:none;border-radius:8px;padding:13px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.modal-btn:active{background:var(--green2)}
.modal-error{color:var(--red);font-size:13px;display:none;text-align:center}


.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:flex-end;justify-content:center}
.sheet-overlay.show{display:flex}
.sheet{background:var(--bg-panel);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:0 0 calc(16px + var(--safe-bottom));max-height:80dvh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#374045;border-radius:2px;margin:12px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px}
.sheet-title{color:var(--t1);font-size:17px;font-weight:600}
.sheet-close{background:none;border:none;color:var(--t2);cursor:pointer;font-size:22px;line-height:1;padding:4px}
.sheet-search{padding:0 16px 10px}
.sheet-search-wrap{background:var(--bg-input);border-radius:8px;display:flex;align-items:center;padding:8px 12px;gap:10px}
.sheet-search-wrap input{background:none;border:none;outline:none;color:var(--t1);font-size:15px;width:100%}
.sheet-search-wrap input::placeholder{color:var(--t2)}
.sheet-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.sheet-user{display:flex;align-items:center;padding:10px 20px;gap:14px;cursor:pointer;transition:background .15s;min-height:64px}
.sheet-user:hover,.sheet-user:active{background:var(--bg-input)}
.sheet-user.already-added{opacity:.45;pointer-events:none}
.sheet-avatar{width:44px;height:44px;border-radius:50%;background:#374045;display:flex;align-items:center;justify-content:center;font-size:16px;color:#aebac1;font-weight:700;flex-shrink:0}
.sheet-uname{flex:1;color:var(--t1);font-size:15px}
.sheet-add-icon{width:32px;height:32px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-empty{padding:40px 20px;text-align:center;color:var(--t2);font-size:14px;line-height:1.6}


.offline-banner{position:fixed;top:var(--safe-top);left:0;right:0;background:#6b4a00;color:#f0c040;font-size:13px;padding:8px 16px;display:none;align-items:center;justify-content:center;gap:8px;z-index:500}
.offline-banner.show{display:flex}


.sidebar{width:360px;min-width:260px;background:var(--bg-deep);display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0;transition:transform .28s cubic-bezier(.4,0,.2,1);height:100%;overflow:hidden}
.sidebar-header{background:var(--bg-panel);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.my-avatar{width:40px;height:40px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;flex-shrink:0}
.sidebar-title{flex:1;min-width:0}
.sidebar-name{color:var(--t1);font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-sub{color:var(--t2);font-size:12px}


.add-contact-btn{width:36px;height:36px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);flex-shrink:0;transition:background .15s}
.add-contact-btn:hover,.add-contact-btn:active{background:var(--bg-input);color:var(--t1)}

.search-area{padding:8px 12px;background:var(--bg-deep);flex-shrink:0}
.search-wrap{background:var(--bg-panel);border-radius:8px;display:flex;align-items:center;padding:8px 12px;gap:10px}
.search-wrap input{background:none;border:none;outline:none;color:var(--t1);font-size:15px;width:100%}
.search-wrap input::placeholder{color:var(--t2)}
.contacts-label{padding:6px 16px 4px;color:var(--t2);font-size:11px;text-transform:uppercase;letter-spacing:.6px;flex-shrink:0}
.users-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.users-list::-webkit-scrollbar{width:4px}
.users-list::-webkit-scrollbar-thumb{background:#374045;border-radius:4px}


.no-contacts{padding:32px 20px;text-align:center;color:var(--t2);font-size:14px;line-height:1.7}
.no-contacts-icon{width:56px;height:56px;border-radius:50%;background:var(--bg-panel);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.no-contacts strong{display:block;color:var(--t1);font-size:15px;margin-bottom:6px}

.user-item{display:flex;align-items:center;padding:12px 16px;gap:13px;cursor:pointer;transition:background .15s;border-bottom:1px solid #1f2c33;min-height:72px}
.user-item:hover,.user-item:active{background:var(--bg-panel)}
.user-item.active{background:var(--bg-input)}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{width:49px;height:49px;border-radius:50%;background:#374045;display:flex;align-items:center;justify-content:center;font-size:17px;color:#aebac1;font-weight:700;user-select:none}
.status-dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg-deep);display:none}
.status-dot.online{background:#25d366;display:block}
.status-dot.offline-d{background:var(--t2);display:block}
.user-info{flex:1;min-width:0}
.uname{color:var(--t1);font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uprev{color:var(--t2);font-size:13px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.utime{color:var(--t2);font-size:11px;flex-shrink:0;align-self:flex-start;padding-top:2px}
.spinner{width:26px;height:26px;border:3px solid var(--bg-input);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:24px auto;display:none}
.spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}


.chat{flex:1;display:flex;flex-direction:column;background:var(--bg-chat);position:relative;overflow:hidden;min-width:0;height:100%}
.chat-bg{position:absolute;inset:0;opacity:.04;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-rule='evenodd'%3E%3Cpath d='M30 28c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-20 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z'/%3E%3C/g%3E%3C/svg%3E")}
.chat-header{background:var(--bg-panel);padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:10;flex-shrink:0;min-height:60px}
.back-btn{display:none;background:none;border:none;color:var(--t2);cursor:pointer;padding:8px 4px;align-items:center;justify-content:center;flex-shrink:0;border-radius:50%;min-width:40px;min-height:40px}
.back-btn:active{background:var(--bg-input)}
.chat-header .avatar{width:40px;height:40px;font-size:14px}
.chat-header-info{flex:1;min-width:0}
.ch-name{color:var(--t1);font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-status{color:var(--t2);font-size:13px}
.typing-txt{color:var(--green);font-size:13px;font-style:italic;display:none}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;padding:24px;text-align:center}
.empty-icon{width:80px;height:80px;border-radius:50%;background:var(--bg-panel);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.empty-state h3{color:var(--t1);font-size:22px;font-weight:300;margin-bottom:8px}
.empty-state p{color:var(--t2);font-size:14px;max-width:260px;line-height:1.6}


.messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:12px 5% 8px;z-index:1;display:flex;flex-direction:column;gap:3px}
.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-thumb{background:#374045;border-radius:6px}
.date-div{text-align:center;margin:8px 0;flex-shrink:0}
.date-div span{background:#182229;color:var(--t2);font-size:12px;padding:4px 12px;border-radius:8px}
.msg-wrap{display:flex}
.msg-wrap.sent{justify-content:flex-end}
.msg-wrap.recv{justify-content:flex-start}
.bubble{padding:6px 10px 8px;border-radius:7.5px;max-width:min(68%,320px);word-wrap:break-word;word-break:break-word}
.sent .bubble{background:var(--bg-sent);border-radius:7.5px 0 7.5px 7.5px}
.recv .bubble{background:var(--bg-recv);border-radius:0 7.5px 7.5px 7.5px}

.btext{color:var(--t1);font-size:14.5px;line-height:1.45;white-space:pre-wrap}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px}
.btime{color:var(--tm);font-size:11px}
.tick{color:var(--blue);font-size:12px}


.bubble-img{max-width:100%;width:100%;border-radius:6px;display:block;cursor:pointer;max-height:260px;object-fit:cover;margin-bottom:4px}
.bubble-video{max-width:100%;width:100%;border-radius:6px;display:block;max-height:260px;margin-bottom:4px}
.bubble-file{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:4px;text-decoration:none;cursor:pointer}
.file-icon{width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-info{min-width:0}
.fname{color:var(--t1);font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.fsize{color:var(--t2);font-size:11px}


.upload-progress{display:none;align-items:center;gap:10px;padding:10px 14px;margin:6px 12px 0;background:var(--bg-input);border-radius:10px;flex-shrink:0}
.upload-progress.show{display:flex}
.progress-bar-wrap{flex:1;background:#374045;border-radius:4px;height:4px;overflow:hidden}
.progress-bar{height:100%;background:var(--green);width:0%;transition:width .2s}
.progress-label{color:var(--t2);font-size:12px;white-space:nowrap}
.upload-preview{background:var(--bg-input);border-radius:10px;padding:10px 14px;margin:6px 12px 0;display:none;align-items:center;gap:10px;z-index:10;flex-shrink:0}
.upload-preview.show{display:flex}
.preview-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;display:none}
.preview-name{flex:1;min-width:0;color:var(--t1);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-cancel{background:none;border:none;color:var(--t2);cursor:pointer;font-size:24px;line-height:1;padding:4px 8px}


.input-area{background:var(--bg-panel);padding:8px 12px;padding-bottom:calc(8px + var(--safe-bottom));display:flex;align-items:flex-end;gap:8px;z-index:10;flex-shrink:0;position:relative}
.icon-btn{background:none;border:none;cursor:pointer;padding:8px;color:var(--t2);display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;min-width:40px;min-height:40px}
.icon-btn:active{color:var(--t1);background:var(--bg-input)}
.msg-input-wrap{flex:1;background:var(--bg-input);border-radius:20px;padding:9px 14px;min-height:42px;display:flex;align-items:center}
.msg-input{width:100%;background:none;border:none;outline:none;color:var(--t1);font-size:16px;resize:none;max-height:120px;font-family:inherit;line-height:1.4;overflow-y:auto;-webkit-overflow-scrolling:touch}
.msg-input::placeholder{color:var(--t2)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-appearance:none;transition:transform .1s}
.send-btn:active{background:var(--green2);transform:scale(.92)}


.attach-menu{position:absolute;bottom:70px;left:12px;background:var(--bg-panel);border-radius:12px;padding:8px;display:none;flex-direction:column;gap:2px;box-shadow:0 4px 24px rgba(0,0,0,.5);z-index:30;min-width:185px}
.attach-menu.show{display:flex}
.attach-opt{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;color:var(--t1);font-size:14px;min-height:52px}
.attach-opt:active{background:var(--bg-input)}
.att-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;z-index:900;padding:20px}
.lightbox.show{display:flex}
.lightbox img,.lightbox video{max-width:100%;max-height:90dvh;border-radius:8px}
.lb-close{position:absolute;top:calc(16px + var(--safe-top));right:16px;background:rgba(0,0,0,.5);border:none;color:#fff;cursor:pointer;font-size:28px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}


.net-toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#1f2c33;color:var(--t1);padding:8px 20px;border-radius:20px;font-size:13px;display:none;z-index:400;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.net-toast.show{display:block}


@media(max-width:680px){
  .sidebar{position:absolute;top:0;left:0;right:0;bottom:0;width:100%;min-width:unset;z-index:50}
  .sidebar.hidden{transform:translateX(-100%);pointer-events:none}
  .chat{width:100%;position:absolute;top:0;left:0;right:0;bottom:0}
  .back-btn{display:flex!important}
  .bubble{max-width:84%}
  .attach-menu{left:8px;bottom:calc(62px + var(--safe-bottom))}
  .sheet{border-radius:16px 16px 0 0}
}
@media(min-width:681px) and (max-width:1024px){.sidebar{width:300px}.bubble{max-width:75%}}
#fileInput,#imgInput,#videoInput{display:none}


.switch {
  position: relative;
  width: 44px;
  height: 22px;
  margin-right: 8px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  cursor: pointer;
  background: #555;
  border-radius: 22px;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  transition: 0.3s;
}

.slider::before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 2px;
  bottom: 2px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #00a884;
}

input:checked + .slider::before {
  transform: translateX(22px);
}

body.light {
  --bg-deep: #f0f2f5;
  --bg-panel: #ffffff;
  --bg-input: #f6f6f6;

  --bg-sent: #d9fdd3;
  --bg-recv: #ffffff;
  --bg-chat: #efeae2;

  --border: #e0e0e0;

  --t1: #111b21;
  --t2: #667781;
  --tm: rgba(0,0,0,.45);

  --green: #00a884;
  --green2: #06cf9c;
  --blue: #53bdeb;
}
* {
  transition: background 0.25s, color 0.25s;
}
.location-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background-color: #005c4b; 
    color: white;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: all 0.2s ease;
}


.location-btn:hover {
    background-color: #036708;
    transform: scale(1.1);
}


.location-btn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>


<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-logo">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" fill="white"/>
        <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.978-1.417A9.954 9.954 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z" stroke="white" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <h2>Welcome to ChatApp</h2>
    <p>Enter your name to start chatting</p>
    <input class="modal-input" id="nameInput" placeholder="Your name" maxlength="30"
      autocomplete="name" autocapitalize="words"
      onkeydown="if(event.key==='Enter')startApp()">
    <div class="modal-error" id="modalError">Please enter your name</div>
    <button class="modal-btn" onclick="startApp()">Continue</button>
  </div>
</div>


<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Add Contact</span>
      <button class="sheet-close" onclick="closeSheet()">×</button>
    </div>
    <div class="sheet-search">
      <div class="sheet-search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#8696a0" stroke-width="2"/><path d="M16.5 16.5L21 21" stroke="#8696a0" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="sheetSearch" placeholder="Search people..." oninput="filterSheet()" autocomplete="off">
      </div>
    </div>
    <div class="sheet-list" id="sheetList"></div>
  </div>
</div>


<div class="offline-banner" id="offlineBanner">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  You are offline — messages will send when reconnected
</div>


<div class="app" id="mainApp" style="display:none">

<div class="net-toast" id="netToast"></div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script>
const BASE = "http://192.168.1.202:8081";
const CONTACTS_KEY = () => 'wa_contacts_' + sender; 

let myName="", sender=null, receiver=null, receiverName="";
let stomp=null, activeItem=null;
let typingTimeout=null, toastTimeout=null;
let pendingFile=null, pendingFileType=null;
let isOnline=navigator.onLine, shownDates=new Set();


let myContacts = [];

let allServerUsers = [];


const gi  = n => n?n.trim().split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2):'?';
const gt  = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sz  = b => b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';

function toast(msg,dur=3000){
  const t=document.getElementById('netToast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>t.classList.remove('show'),dur);
}



function updateNet() {
  isOnline = navigator.onLine;
  const banner = document.getElementById('offlineBanner');

  if (!isOnline) {
    banner.classList.add('show');
    setMyStatus('offline');
    toast('⚠ You are offline', 6000);
  } else {
    banner.classList.remove('show');
    setMyStatus('connecting');          
    toast('✓ Back online', 2500);
    if (sender && receiver) {
      if (stomp && stomp.connected) stomp.disconnect();
      connect();
    }
  }
}

function setMyStatus(state) {
  const sub = document.getElementById('myStatus');
  if (!sub) return;
  const map = {
    online:     { text: '● Active now',   color: '#25d366' },
    connecting: { text: '● Connecting…',  color: '#f0c040' },
    offline:    { text: '● Offline',      color: '#f15c6d' },
  };
  const s = map[state] || map.online;
  sub.textContent = s.text;
  sub.style.color  = s.color;
}
window.addEventListener('online',updateNet);
window.addEventListener('offline',updateNet);


function startApp(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){document.getElementById('modalError').style.display='block';return;}
  document.getElementById('modalError').style.display='none';
  myName=name;
  fetch(BASE+'/api/users/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:myName})})
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(u=>{sender=u.id;showApp();})
  .catch(()=>{sender='tmp_'+Date.now();showApp();toast('⚠ Could not reach server',5000);});
}

function showApp(){
  document.getElementById('modal').style.display='none';
  document.getElementById('mainApp').style.display='flex';
  document.getElementById('myAvatar').textContent=gi(myName);
  document.getElementById('myNameLabel').textContent=myName;
  updateNet();
  loadMyContacts();
 

  (function(){
  const saved = localStorage.getItem("theme");
  if(saved === "light"){
    document.body.classList.add("light");
    const t = document.getElementById("themeToggle");
    if(t) t.checked = true;
  }
})();
}


function loadMyContacts(){
  try{
    const saved=localStorage.getItem(CONTACTS_KEY());
    myContacts=saved?JSON.parse(saved):[];
  }catch(e){ myContacts=[]; }
  renderContacts(myContacts);
  refreshOnlineStatus();
  
}


function saveContacts(){
  try{ localStorage.setItem(CONTACTS_KEY(),JSON.stringify(myContacts)); }catch(e){}
}

function filterContacts(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  renderContacts(myContacts.filter(u=>u.name.toLowerCase().includes(q)));
}

function renderContacts(list){
  const div=document.getElementById('users');
  div.innerHTML='';
  if(list.length===0){
    div.innerHTML=`
      <div class="no-contacts">
        <div class="no-contacts-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="#8696a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="7" r="4" stroke="#8696a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="19" y1="8" x2="19" y2="14" stroke="var(--green)" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="11" x2="22" y2="11" stroke="var(--green)" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <strong>No contacts yet</strong>
        Tap the <span style="color:var(--green);font-weight:600">+</span> button above to add people who are logged in
      </div>`;
    return;
  }
  list.forEach(u=>{
    const el=document.createElement('div');
    el.className='user-item'; el.id='item-'+u.id;
    el.innerHTML=`
      <div class="avatar-wrap">
        <div class="avatar" style="background:#1f2c33;color:#8696a0">${gi(u.name)}</div>
        <div class="status-dot" id="dot-${u.id}"></div>
      </div>
      <div class="user-info">
        <div class="uname">${esc(u.name)}</div>
        <div class="uprev" id="prev-${u.id}">Tap to chat</div>
      </div>
      <div class="utime" id="time-${u.id}"></div>`;
    el.onclick=()=>{
      if(activeItem)activeItem.classList.remove('active');
      el.classList.add('active'); activeItem=el; openChat(u);
    };
    div.appendChild(el);
  });
  refreshOnlineStatus();
}


function refreshOnlineStatus() {
  fetch(BASE + '/api/users/online')
    .then(r => r.json())
    .then(ids => {
     
      const onlineSet = new Set(ids.map(String));

      myContacts.forEach(u => {
        const isOnl = onlineSet.has(String(u.id));
        const dot   = document.getElementById('dot-' + u.id);
        if (dot) dot.className = 'status-dot ' + (isOnl ? 'online' : 'offline-d');

        if (String(u.id) === String(receiver)) {
          document.getElementById('chatStatus').textContent = isOnl ? 'online' : 'offline';
        }
      });
    })
    .catch(() => {
     
      if (receiver) document.getElementById('chatStatus').textContent = 'offline';
    });
}

function updateChatStatus(userId, isOnline) {
  if (String(userId) === String(receiver)) {
    document.getElementById('chatStatus').textContent =
      isOnline ? 'online' : 'offline';
  }
}

function openSheet(){
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('sheetSearch').value='';
  document.getElementById('sheetList').innerHTML=`<div style="padding:24px;text-align:center;color:var(--t2)">Loading...</div>`;
  

  fetch(BASE+'/api/users',{headers:{'Accept':'application/json'}})
  .then(r=>r.json())
  .then(data=>{
    
    allServerUsers=data.filter(u=>String(u.id)!==String(sender));
    renderSheet(allServerUsers);
  })
  .catch(()=>{
    document.getElementById('sheetList').innerHTML=
      `<div class="sheet-empty">⚠ Could not load users.<br>Make sure your backend is running.</div>`;
  });
  setTimeout(()=>document.getElementById('sheetSearch').focus(),300);
}

function closeSheet(e){
  if(e&&e.target!==document.getElementById('sheetOverlay')) return;
  document.getElementById('sheetOverlay').classList.remove('show');
}

function filterSheet(){
  const q=document.getElementById('sheetSearch').value.toLowerCase();
  renderSheet(allServerUsers.filter(u=>u.name.toLowerCase().includes(q)));
}

function renderSheet(users){
  const list=document.getElementById('sheetList');
  list.innerHTML='';
  if(users.length===0){
    list.innerHTML=`<div class="sheet-empty">No users found.<br>Ask others to log in first.</div>`;
    return;
  }
  const addedIds=new Set(myContacts.map(c=>String(c.id)));
  users.forEach(u=>{
    const already=addedIds.has(String(u.id));
    const el=document.createElement('div');
    el.className='sheet-user'+(already?' already-added':'');
    el.innerHTML=`
      <div class="sheet-avatar">${gi(u.name)}</div>
      <span class="sheet-uname">${esc(u.name)}</span>
      ${already
        ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `<div class="sheet-add-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>`
      }`;
    if(!already){
      el.onclick=()=>addContact(u,el);
    }
    list.appendChild(el);
  });
}

function addContact(u, el){
  
  myContacts.push({id:u.id,name:u.name});
  saveContacts();
  renderContacts(myContacts);
 
  el.classList.add('already-added');
  el.querySelector('.sheet-add-icon').outerHTML=
    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  toast(`${u.name} added to contacts`);
}


function openChat(u) {
  receiver = u.id; receiverName = u.name;
  document.getElementById('emptyState').style.display  = 'none';
  document.getElementById('activeChat').style.display  = 'flex';
  document.getElementById('chatName').textContent       = u.name;
  document.getElementById('chatAvatar').textContent     = gi(u.name);
  document.getElementById('typingTxt').style.display   = 'none';
  document.getElementById('box').innerHTML             = '';
  shownDates.clear();
  cancelUpload();

  
  document.getElementById('chatStatus').textContent = '…';

  if (window.innerWidth <= 680) document.getElementById('sidebar').classList.add('hidden');
  if (stomp && stomp.connected) stomp.disconnect();
  connect();                          
}

function goBack(){
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('activeChat').style.display='none';
  document.getElementById('emptyState').style.display='flex';
  if(stomp&&stomp.connected) stomp.disconnect();
  receiver=null;
  if(activeItem){activeItem.classList.remove('active');activeItem=null;}
}





function connect() {
  if (!isOnline) return;

  const sock = new SockJS(BASE + '/chat?userId=' + sender);
  stomp = Stomp.over(sock);
  stomp.debug = null;

  stomp.connect({}, () => {

    
    setMyStatus('online');

    stomp.send("/app/addUser", {}, JSON.stringify({
      senderId: Number(sender),
      senderName: myName
    }));

    
    stomp.subscribe('/topic/status', m => {
      const data = JSON.parse(m.body);
      const uid  = String(data.userId);
      const isOnl = data.online;

      const dot = document.getElementById('dot-' + uid);
      if (dot) dot.className = 'status-dot ' + (isOnl ? 'online' : 'offline-d');

    
      if (uid === String(receiver)) {
        document.getElementById('chatStatus').textContent = isOnl ? 'online' : 'offline';
      }
    });

    
    stomp.subscribe('/user/queue/messages', m => {
      const msg = JSON.parse(m.body);

      const isCurrentChat =
        String(msg.senderId) === String(receiver) ||
        String(msg.receiverId) === String(receiver);

      const isFromOtherUser = String(msg.senderId) !== String(sender);

      if (msg.type === 'LOCATION') {
        if (isCurrentChat && isFromOtherUser) show(msg);
        const fromId = String(msg.senderId) === String(sender)
          ? String(msg.receiverId) : String(msg.senderId);
        const p = document.getElementById('prev-' + fromId);
        if (p) p.textContent = '📍 Location';
        const t = document.getElementById('time-' + fromId);
        if (t) t.textContent = gt();
        return;
      }

      if (msg.mediaType) {
        if (isCurrentChat && isFromOtherUser) show(msg);
        const fromId = String(msg.senderId) === String(sender)
          ? String(msg.receiverId) : String(msg.senderId);
        const preview =
          msg.mediaType === 'image' ? '📷 Photo' :
          msg.mediaType === 'video' ? '🎥 Video' :
          msg.mediaType === 'file'  ? '📄 File'  : '';
        const p = document.getElementById('prev-' + fromId);
        if (p) p.textContent = preview;
        const t = document.getElementById('time-' + fromId);
        if (t) t.textContent = gt();
        return;
      }

      if (isCurrentChat && isFromOtherUser) show(msg);
      const fromId = String(msg.senderId) === String(sender)
        ? String(msg.receiverId) : String(msg.senderId);
      const p = document.getElementById('prev-' + fromId);
      if (p) p.textContent = msg.content || '';
      const t = document.getElementById('time-' + fromId);
      if (t) t.textContent = gt();
    });

    
    stomp.subscribe('/user/queue/typing', m => {
      const txt = document.getElementById('typingTxt');
      const st  = document.getElementById('chatStatus');
      txt.textContent = 'typing...';
      txt.style.display = 'block';
      st.style.display  = 'none';
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        txt.style.display = 'none';
        st.style.display  = 'block';
      }, 2500);
    });

    
    refreshOnlineStatus();
    loadHistory();

  }, err => {
    console.log("WebSocket error:", err);
    setMyStatus('connecting');
    setTimeout(() => {
      if (isOnline && receiver) connect();
    }, 3000);
  });
}



window.addEventListener("beforeunload", () => {
  if (stomp && stomp.connected && sender) {
    stomp.send("/app/userOffline", {}, JSON.stringify({ senderId: Number(sender) }));
  }
});


function send(){
  if(pendingFile){sendFile();return;}
  const text=document.getElementById('msg').value.trim();
  if(!text||!receiver) return;
  const msg={senderId:Number(sender),senderName:myName,receiverId:Number(receiver),content:text};
  if(stomp&&stomp.connected) stomp.send('/app/send',{},JSON.stringify(msg));
  showLocal(msg);
  document.getElementById('msg').value='';
  autoResize(document.getElementById('msg'));
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey&&window.innerWidth>680){e.preventDefault();send();}}
function sendTyping(){
  if(!stomp||!stomp.connected||!receiver) return;
  stomp.send('/app/typing',{},JSON.stringify({senderId:Number(sender),senderName:myName,receiverId:Number(receiver),content:''}));
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}


function toggleAttach(){
  const m=document.getElementById('attachMenu');
  m.classList.toggle('show');
  if(m.classList.contains('show')) setTimeout(()=>document.addEventListener('click',closeAttachOut,{once:true}),0);
}
function closeAttachOut(e){if(!document.getElementById('attachMenu').contains(e.target))document.getElementById('attachMenu').classList.remove('show');}
function triggerImg()  {document.getElementById('attachMenu').classList.remove('show');document.getElementById('imgInput').click();}
function triggerVideo(){document.getElementById('attachMenu').classList.remove('show');document.getElementById('videoInput').click();}
function triggerFile() {document.getElementById('attachMenu').classList.remove('show');document.getElementById('fileInput').click();}

function handleFile(input,type){
  const file=input.files[0]; if(!file) return;
  pendingFile=file; pendingFileType=type;
  const thumb=document.getElementById('previewThumb');
  document.getElementById('previewName').textContent=file.name+' ('+sz(file.size)+')';
  if(type==='image'){thumb.src=URL.createObjectURL(file);thumb.style.display='block';}
  else{thumb.style.display='none';}
  document.getElementById('uploadPreview').classList.add('show');
  document.getElementById('msg').placeholder='Add a caption... (optional)';
  input.value='';
}
function cancelUpload(){
  pendingFile=null; pendingFileType=null;
  document.getElementById('uploadPreview').classList.remove('show');
  document.getElementById('uploadProgress').classList.remove('show');
  document.getElementById('previewThumb').src='';
  document.getElementById('msg').placeholder='Type a message';
}

function sendFile(){
  const file=pendingFile,type=pendingFileType;
  const caption=document.getElementById('msg').value.trim();
  document.getElementById('uploadPreview').classList.remove('show');
  document.getElementById('uploadProgress').classList.add('show');
  document.getElementById('progressBar').style.width='0%';
  document.getElementById('progressLabel').textContent='Uploading...';
  const fd=new FormData(); fd.append('file',file);
  const xhr=new XMLHttpRequest();
  xhr.open('POST',BASE+'/api/files/upload');
  xhr.upload.onprogress=e=>{
    if(e.lengthComputable){
      const p=Math.round(e.loaded/e.total*100);
      document.getElementById('progressBar').style.width=p+'%';
      document.getElementById('progressLabel').textContent=p+'%';
    }
  };
  xhr.onload=()=>{
    document.getElementById('uploadProgress').classList.remove('show');
    if(xhr.status===200){
      const res=JSON.parse(xhr.responseText);
      const fullUrl=BASE+res.url;
      const msg={senderId:Number(sender),senderName:myName,receiverId:Number(receiver),
                 content:caption,mediaType:type,mediaUrl:fullUrl,fileName:file.name,fileSize:file.size};
      showLocal(msg);
      if(stomp&&stomp.connected) stomp.send('/app/send',{},JSON.stringify(msg));
      cancelUpload();
      document.getElementById('msg').value='';
      autoResize(document.getElementById('msg'));
    } else { toast('Upload failed — '+xhr.status,4000); cancelUpload(); }
  };
  xhr.onerror=()=>{document.getElementById('uploadProgress').classList.remove('show');toast('Upload failed',4000);cancelUpload();};
  xhr.send(fd);
}


function insertDateDiv(ts){
  let label='Today';
  if(ts){
    const d=new Date(ts),today=new Date(),yest=new Date();
    yest.setDate(today.getDate()-1);
    if(d.toDateString()===today.toDateString()) label='Today';
    else if(d.toDateString()===yest.toDateString()) label='Yesterday';
    else label=d.toLocaleDateString([],{day:'numeric',month:'short',year:'numeric'});
  }
  if(!shownDates.has(label)){
    shownDates.add(label);
    const div=document.createElement('div');
    div.className='date-div';
    div.innerHTML=`<span>${label}</span>`;
    document.getElementById('box').appendChild(div);
  }
}

function show(m){
  const box=document.getElementById('box');
  const sent=String(m.senderId)===String(sender);
  insertDateDiv(m.timestamp);
  const wrap=document.createElement('div');
  wrap.className='msg-wrap '+(sent?'sent':'recv');

  wrap.innerHTML=`<div class="bubble">
    ${mediaHtml(m)}
    ${m.content?`<div class="btext">${esc(m.content)}</div>`:''}
    <div class="bmeta">
      <span class="btime">${fmtTs(m.timestamp)||gt()}</span>
      ${sent?'<span class="tick">✓✓</span>':''}
    </div>
  </div>`;
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}

function showLocal(m){
  const box=document.getElementById('box');
  insertDateDiv(null);
  const wrap=document.createElement('div');
  wrap.className='msg-wrap sent';
  wrap.innerHTML=`<div class="bubble">
    ${mediaHtml(m)}
    ${m.content?`<div class="btext">${esc(m.content)}</div>`:''}
    <div class="bmeta">
      <span class="btime">${gt()}</span>
      <span class="tick">✓</span>
    </div>
  </div>`;
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}

function mediaHtml(m){
  if(m.type === 'LOCATION'){
    return `
      <iframe 
        width="250" 
        height="150" 
        style="border-radius:8px;border:none"
        src="https://maps.google.com/maps?q=${m.latitude},${m.longitude}&z=15&output=embed">
      </iframe>
    `;
  }

  if(!m.mediaType) return '';
  const url=m.mediaUrl||'';
  if(!url) return '';

  if(m.mediaType==='image')
    return `<img class="bubble-img" src="${esc(url)}">`;

  if(m.mediaType==='video')
    return `<video class="bubble-video" src="${esc(url)}" controls></video>`;

  if(m.mediaType==='file')
    return `<a class="bubble-file" href="${esc(url)}">${m.fileName}</a>`;

  return '';
}

function fmtTs(ts){
  if(!ts) return null;
  try{return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){return null;}
}


function openLb(type,src){
  const img=document.getElementById('lbImg'),vid=document.getElementById('lbVid');
  if(type==='img'){img.src=src;img.style.display='block';vid.style.display='none';}
  else{vid.src=src;vid.style.display='block';img.style.display='none';}
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
  try{document.getElementById('lbVid').pause();}catch(e){}
}


function loadHistory(){
  fetch(`${BASE}/api/chat/history?senderId=${sender}&receiverId=${receiver}`)
  .then(r=>{if(!r.ok)throw new Error();return r.json();})
  .then(data=>{
    document.getElementById('box').innerHTML=''; shownDates.clear();
    data.forEach(m=>show(m));
  })
  .catch(()=>toast('Could not load message history',3000));
}


if('visualViewport' in window){
  window.visualViewport.addEventListener('resize',()=>{
    const box=document.getElementById('box');
    if(box) box.scrollTop=box.scrollHeight;
  });
}


window.addEventListener('popstate',()=>{
  if(document.getElementById('sheetOverlay').classList.contains('show')){
    document.getElementById('sheetOverlay').classList.remove('show');
    history.pushState(null,''); return;
  }
  if(document.getElementById('sidebar').classList.contains('hidden')){
    goBack(); history.pushState(null,'');
  }
});
history.pushState(null,'');


window.addEventListener('resize',()=>{
  if(window.innerWidth>680) document.getElementById('sidebar').classList.remove('hidden');
});

function toggleTheme(el){
  if(el.checked){
    document.body.classList.add("light");
    localStorage.setItem("theme","light");
  } else {
    document.body.classList.remove("light");
    localStorage.setItem("theme","dark");
  }
}

function sendCurrentLocation() {
    if (!receiver) return;

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(position => {

            const message = {
                senderId: Number(sender),
                senderName: myName,
                receiverId: Number(receiver),
                type: 'LOCATION',
                latitude: position.coords.latitude,
                longitude: position.coords.longitude
            };

            stomp.send("/app/send", {}, JSON.stringify(message));
            
            showLocal(message); 
        });
    } else {
        alert("Geolocation not supported");
    }
}
